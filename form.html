<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="CSS/style.css">
    <title>Form</title>
    <link href="https://fonts.googleapis.com/css2?family=Honk" rel="stylesheet">
</head>
<body>
    <header>
        <h2>Fill out the form to receive a personalised evaluation from one of our experts!</h2>
    </header><br>

    <!--form-->
    <form action="/action_page.php">
        <!--Email-->
        <label for="email">Email address:</label><br>
        <input type="email" id="email" name="email" required><br><br>

        <!--Phone number-->
        <label for="number">Cellphone number (optional):</label><br>
        <input type="text" id="number" name="number"><br><br>

        <!--Name-->
        <label for="name">Name and surname:</label><br>
        <input type="text" id="name" name="name" required><br><br>

        <!--Gender-->
        <label for="gender">Gender</label>
        <select id="gender" name="gender">
            <option value="male">Male</option>
            <option value="female">Female</option>
            <option value="other">Other</option>
        </select><br><br><br>

        <!--Age-->
        <label for="quantity">Please enter your age:</label>
        <input type="number" id="quantity" name="quantity" min="18" required><br><br>

        <!--Weight-->
        <label for="quantity">Please enter your weight (kg):</label>
        <input type="number" id="quantity" name="quantity" required><br><br>


        <!--Disabilities-->
        <p>Do you have any disabilities</p>
        <input type="radio" id="yes" name="disability_check" value="yes" required>
        <label for="yes">Yes</label><br>
        <input type="radio" id="no" name="disability_check" value="no" required>
        <label for="no">No</label><br><br>

        <label for="disability">If yes, please specify:</label><br><br>
        <input type="text" id="disability" name="disability"><br><br><br>

        <input type="submit" value="Submit">
        <input type="reset" value="Reset">
    </form>
</body>
</html>
